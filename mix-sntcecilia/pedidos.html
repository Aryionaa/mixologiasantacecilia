<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos — Barra Aceary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{ font-family: 'Fredoka', sans-serif; max-width:900px; margin:30px auto; padding:0 20px; background:#FFFBF0; color:#14110B; }
  h1{ font-family: 'Bungee', cursive; color:#D4AF37; text-align:center; }
  h2{ color:#3E7D5A; margin-top:40px; }
  .pedido{ background:white; border:2px solid #14110B; border-radius:10px; padding:15px; margin:12px 0; box-shadow:3px 3px 0 #D4AF37; }
  .fecha{ font-size:0.85rem; color:#666; margin-bottom:8px; }
  .estado-pendiente{ color:#C2402B; font-weight:bold; }
  .estado-entregado{ color:#3E7D5A; font-weight:bold; }
  .btn{ padding:7px 12px; border:none; border-radius:6px; color:white; text-decoration:none; display:inline-block; margin-right:8px; font-size:0.9rem; cursor:pointer; font-family:inherit; }
  .btn-entregar{ background:#3E7D5A; }
  .btn-borrar{ background:#C2402B; }
  .vacio{ text-align:center; color:#9A927A; padding:30px; }
  pre{ white-space:pre-wrap; font-family:inherit; font-size:0.95rem; line-height:1.5; margin:10px 0; }
  .volver{ display:block; margin-top:30px; text-align:center; color:#D4AF37; font-weight:bold; }
</style>
</head>
<body>

<h1>📋 Lista de Pedidos</h1>

<h2>🔴 Pendientes</h2>
<div id="lista-pendientes"></div>

<h2>✅ Entregados</h2>
<div id="lista-entregados"></div>

<a href="index.html" class="volver">← Volver al menú</a>

<script>
function cargarPedidos(){
  const todos = JSON.parse(localStorage.getItem("pedidos_barra") || "[]");
  const pendientes = todos.filter(p => p.estado === "pendiente");
  const entregados = todos.filter(p => p.estado === "entregado");

  const pendEl = document.getElementById("lista-pendientes");
  const entrEl = document.getElementById("lista-entregados");

  pendEl.innerHTML = pendientes.length ? "" : `<div class="vacio">Sin pedidos pendientes ✅</div>`;
  entrEl.innerHTML = entregados.length ? "" : `<div class="vacio">Sin pedidos entregados</div>`;

  pendientes.forEach(p => {
    pendEl.innerHTML += `
      <div class="pedido">
        <div class="fecha">${p.fecha} · <span class="estado-pendiente">PENDIENTE</span></div>
        <pre>${p.texto}</pre>
        <button class="btn btn-entregar" onclick="marcar('${p.id}')">✅ Marcar Entregado</button>
        <button class="btn btn-borrar" onclick="borrar('${p.id}')">🗑️ Borrar</button>
      </div>`;
  });

  entregados.forEach(p => {
    entrEl.innerHTML += `
      <div class="pedido">
        <div class="fecha">${p.fecha} · <span class="estado-entregado">ENTREGADO</span></div>
        <pre>${p.texto}</pre>
        <button class="btn btn-borrar" onclick="borrar('${p.id}')">🗑️ Borrar</button>
      </div>`;
  });
}

function marcar(id){
  const todos = JSON.parse(localStorage.getItem("pedidos_barra") || "[]");
  const actualizados = todos.map(p => p.id === id ? {...p, estado:"entregado"} : p);
  localStorage.setItem("pedidos_barra", JSON.stringify(actualizados));
  cargarPedidos();
}

function borrar(id){
  if(!confirm("¿Eliminar este pedido definitivamente?")) return;
  const todos = JSON.parse(localStorage.getItem("pedidos_barra") || "[]");
  const filtrados = todos.filter(p => p.id !== id);
  localStorage.setItem("pedidos_barra", JSON.stringify(filtrados));
  cargarPedidos();
}

cargarPedidos();
</script>

</body>
</html>
